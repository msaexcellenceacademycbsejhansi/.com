/* SLIDER */
.slider{
  width:100%;
  height:400px;
  overflow:hidden;
  position:relative;
  background:white;
}

.slides{
  display:flex;
  width:300%;
  animation:slide 7s infinite;
}

.slides img{
  width:100%;
  height:400px;
  object-fit:contain;
}

/* SLIDE ANIMATION */
@keyframes slide{
  0%{margin-left:0;}
  33%{margin-left:0;}
  40%{margin-left:-100%;}
  73%{margin-left:-100%;}
  80%{margin-left:-200%;}
  100%{margin-left:-200%;}
}

/* WELCOME TEXT */
.welcome{
  text-align:center;
  padding:20px;
  font-size:28px;
  background:#e6f0f8;
}
