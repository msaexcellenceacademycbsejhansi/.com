<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Website</title>

<style>
body{
  margin:0;
  font-family:Arial;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  background:#f5f5f5;
}

.logo{<img src="1774414444029.jpg"}
  height:80px;
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:center;
  gap:10px;
  background:white;
  padding:10px;
}

.nav button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#f1d94c;
  cursor:pointer;
  font-weight:bold;
}

.nav button:hover{
  background:#ddd;
}

/* SLIDER */
.slider{
  width:100%;
  height:400px;
  overflow:hidden;
  position:relative;
}

.slides{
  display:flex;
  width:300%;
  animation:slide 12s infinite;
}

.slides img{
  width:100%;
  height:400px;
  object-fit:cover;
}

/* SLIDE ANIMATION */
@keyframes slide{
  0%{margin-left:0;}
  33%{margin-left:0;}
  40%{margin-left:-100%;}
  73%{margin-left:-100%;}
  80%{margin-left:-200%;}
  100%{margin-left:-200%;}
}

/* WELCOME TEXT */
.welcome{
  text-align:center;
  padding:20px;
  font-size:28px;
  background:#e6f0f8;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://via.placeholder.com/150" class="logo">
</div>

<!-- NAVBAR -->
<div class="nav">
  <button>Home</button>
  <button>About</button>
  <button>Admissions</button>
  <button>Academics</button>
  <button>Gallery</button>
  <button>Contact</button>
</div>

<!-- IMAGE SLIDER -->
<div class="slider">
  <div class="slides">
    <img src="https://picsum.photos/1200/400?1">
    <img src="https://picsum.photos/1200/400?2">
    <img src="https://picsum.photos/1200/400?3">
  </div>
</div>

<!-- WELCOME TEXT -->
<div class="welcome">
  Welcome to M.S.A Excellence Academy
</div>

</body>
</html>
